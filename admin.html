<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>イベント登録</title>
</head>

<body>

<a href="index.html">← トップに戻る</a>

<h1>イベント登録</h1>

<p>イベント名</p>
<input id="title">

<p>日付</p>
<input id="date" type="date">

<p>出演アイドル</p>
<select id="idolSelect">
  <option value="">選択してください</option>
</select>

<p>出演開始</p>
<input id="startTime" placeholder="18:00">

<p>出演終了</p>
<input id="endTime" placeholder="18:30">

<p>特典会時間</p>
<input id="benefitTime" placeholder="20:00-21:00">

<h3>入特</h3>

<label>
  <input type="checkbox" class="benefitCheck" value="チェキ券">
  チェキ券
</label>
枚数 <input type="number" class="benefitCount" data-benefit="チェキ券" min="1" value="1">
<br>

<label>
  <input type="checkbox" class="benefitCheck" value="写メ券">
  写メ券
</label>
枚数 <input type="number" class="benefitCount" data-benefit="写メ券" min="1" value="1">
<br>

<label>
  <input type="checkbox" class="benefitCheck" value="動画券">
  動画券
</label>
枚数 <input type="number" class="benefitCount" data-benefit="動画券" min="1" value="1">
<br>

<label>
  <input type="checkbox" id="otherCheck" value="その他">
  その他
</label>
<input id="otherText" placeholder="例：サイン券">
枚数 <input type="number" id="otherCount" min="1" value="1">

<br><br>

<button id="submitBtn">登録</button>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getFirestore, collection, getDocs, addDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyBk42gV5BH_ZiM79DSKPqAKXWU44REVpngk",
    authDomain: "fumiya-calender.firebaseapp.com",
    projectId: "fumiya-calender",
    storageBucket: "fumiya-calender.firebasestorage.app",
    messagingSenderId: "946430755375",
    appId: "1:946430755375:web:b64afd78461cb94143fcda"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  const idolSelect = document.getElementById("idolSelect");
  let idols = [];

  async function loadIdols() {
    const snapshot = await getDocs(collection(db, "idols"));

    snapshot.forEach(doc => {
      const idol = doc.data();
      idols.push(idol);

      const option = document.createElement("option");
      option.value = idol.idolId;
      option.textContent = idol.name;

      idolSelect.appendChild(option);
    });
  }

  loadIdols();

  function getSelectedBenefits() {
    const benefits = [];

    document.querySelectorAll(".benefitCheck").forEach(check => {
      if (check.checked) {
        const name = check.value;
        const countInput = document.querySelector(`.benefitCount[data-benefit="${name}"]`);
        const count = Number(countInput.value);

        benefits.push(`${name}${count}枚`);
      }
    });

    const otherCheck = document.getElementById("otherCheck");

    if (otherCheck.checked) {
      const otherText = document.getElementById("otherText").value;
      const otherCount = Number(document.getElementById("otherCount").value);

      if (otherText) {
        benefits.push(`${otherText}${otherCount}枚`);
      }
    }

    return benefits;
  }

  document.getElementById("submitBtn").addEventListener("click", async () => {

    const title = document.getElementById("title").value;
    const date = document.getElementById("date").value;

    const idolId = Number(idolSelect.value);
    const idol = idols.find(i => i.idolId === idolId);

    const startTime = document.getElementById("startTime").value;
    const endTime = document.getElementById("endTime").value;
    const benefitTime = document.getElementById("benefitTime").value;

    const benefits = getSelectedBenefits();

    await addDoc(collection(db, "events"), {
      title: title,
      date: date,
      appearances: [
        {
          idolId: idolId,
          idolName: idol.name,
          startTime: startTime,
          endTime: endTime,
          benefitTime: benefitTime,
          benefits: benefits
        }
      ]
    });

    alert("登録完了！");
  });
</script>

</body>
</html>
