<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>アイドルライブカレンダー</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.css" rel="stylesheet">
</head>

<body>

<h1>アイドルライブカレンダー</h1>

<input type="text" id="searchInput" placeholder="検索（アイドル・イベント）">
<ul id="searchResults"></ul>

<button id="showFavorites">お気に入りだけ表示</button>
<button id="showAll">全て表示</button>

<div id="calendar"></div>

<script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.js"></script>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyBk42gV5BH_ZiM79DSKPqAKXWU44REVpngk",
    authDomain: "fumiya-calender.firebaseapp.com",
    projectId: "fumiya-calender",
    storageBucket: "fumiya-calender.firebasestorage.app",
    messagingSenderId: "946430755375",
    appId: "1:946430755375:web:b64afd78461cb94143fcda"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  let allEventsData = [];
  let allIdolsData = [];
  let calendar;

  async function loadEvents() {
    allEventsData = [];

    const querySnapshot = await getDocs(collection(db, "events"));
    const calendarEvents = [];

    querySnapshot.forEach((doc) => {
      const data = doc.data();
      allEventsData.push(data);

      calendarEvents.push({
        title: data.title,
        start: data.date
      });
    });

    return calendarEvents;
  }

  async function loadIdols() {
    allIdolsData = [];

    const querySnapshot = await getDocs(collection(db, "idols"));

    querySnapshot.forEach((doc) => {
      allIdolsData.push(doc.data());
    });
  }

  function convertEvents(events) {
    return events.map(e => ({
      title: e.title,
      start: e.date
    }));
  }

  function normalizeText(text) {
    return String(text || "").toLowerCase().trim();
  }

  function getAliases(idol) {
    if (Array.isArray(idol.aliases)) {
      return idol.aliases;
    }

    if (typeof idol.aliases === "string") {
      return [idol.aliases];
    }

    return [];
  }

  document.addEventListener("DOMContentLoaded", async function () {
    await loadIdols();
    const events = await loadEvents();

    calendar = new FullCalendar.Calendar(
      document.getElementById("calendar"),
      {
        initialView: "dayGridMonth",
        events: events,

        eventClick: function(info) {
          const title = info.event.title;
          const date = info.event.startStr;

          window.location.href = `event.html?title=${encodeURIComponent(title)}&date=${date}`;
        }
      }
    );

    calendar.render();

    document.getElementById("showFavorites").addEventListener("click", function () {
      const favorites = JSON.parse(localStorage.getItem("favorites")) || [];

      const filtered = allEventsData.filter(event =>
        event.appearances?.some(a => favorites.includes(Number(a.idolId)))
      );

      calendar.removeAllEvents();
      calendar.addEventSource(convertEvents(filtered));
    });

    document.getElementById("showAll").addEventListener("click", function () {
      calendar.removeAllEvents();
      calendar.addEventSource(events);
    });

    const searchInput = document.getElementById("searchInput");
    const searchResults = document.getElementById("searchResults");

    searchInput.addEventListener("input", function () {
      const keyword = normalizeText(searchInput.value);
      searchResults.innerHTML = "";

      if (keyword === "") return;

      // イベント検索
      allEventsData.forEach(event => {
        const title = normalizeText(event.title);

        if (title.includes(keyword)) {
          const li = document.createElement("li");

          const link = document.createElement("a");
          link.textContent = "【イベント】" + event.title;
          link.href = `event.html?title=${encodeURIComponent(event.title)}&date=${event.date}`;

          li.appendChild(link);
          searchResults.appendChild(li);
        }
      });

      // アイドル検索：idols コレクションだけを見る
      allIdolsData.forEach(idol => {
        const name = normalizeText(idol.name);
        const kana = normalizeText(idol.kana);
        const aliases = getAliases(idol).map(alias => normalizeText(alias));

        const isMatch =
          name.includes(keyword) ||
          kana.includes(keyword) ||
          aliases.some(alias => alias.includes(keyword));

        if (isMatch) {
          const li = document.createElement("li");

          const link = document.createElement("a");
          link.textContent = "【アイドル】" + idol.name;
          link.href = `idol.html?id=${idol.idolId}`;

          li.appendChild(link);
          searchResults.appendChild(li);
        }
      });
    });
  });
</script>

</body>
</html>
