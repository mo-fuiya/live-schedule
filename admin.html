<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>イベント登録</title>
</head>

<body>

<h1>イベント登録</h1>

<p>イベント名</p>
<input id="title">

<p>日付</p>
<input id="date" type="date">

<p>アイドル名</p>
<input id="idolName">

<p>アイドルID</p>
<input id="idolId" type="number">

<p>出演開始</p>
<input id="startTime" placeholder="18:00">

<p>出演終了</p>
<input id="endTime" placeholder="18:30">

<p>特典会時間</p>
<input id="benefitTime" placeholder="20:00-21:00">

<p>特典（カンマ区切り）</p>
<input id="benefits" placeholder="写メ券,動画券">

<br><br>

<button id="submitBtn">登録</button>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyBk42gV5BH_ZiM79DSKPqAKXWU44REVpngk",
    authDomain: "fumiya-calender.firebaseapp.com",
    projectId: "fumiya-calender",
    storageBucket: "fumiya-calender.firebasestorage.app",
    messagingSenderId: "946430755375",
    appId: "1:946430755375:web:b64afd78461cb94143fcda"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  document.getElementById("submitBtn").addEventListener("click", async () => {

    const title = document.getElementById("title").value;
    const date = document.getElementById("date").value;

    const idolName = document.getElementById("idolName").value;
    const idolId = Number(document.getElementById("idolId").value);

    const startTime = document.getElementById("startTime").value;
    const endTime = document.getElementById("endTime").value;

    const benefitTime = document.getElementById("benefitTime").value;

    const benefits = document.getElementById("benefits").value.split(",");

    await addDoc(collection(db, "events"), {
      title: title,
      date: date,
      appearances: [
        {
          idolId: idolId,
          idolName: idolName,
          startTime: startTime,
          endTime: endTime,
          benefitTime: benefitTime,
          benefits: benefits
        }
      ]
    });

    alert("登録完了！");
  });
</script>

</body>
</html>
