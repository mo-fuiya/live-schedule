<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>イベント登録</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: sans-serif;
      padding: 16px;
      background: #f7f7f7;
    }

    input, select, textarea {
      width: 100%;
      max-width: 420px;
      padding: 8px;
      margin-bottom: 8px;
      box-sizing: border-box;
    }

    .section {
      background: white;
      padding: 12px;
      margin: 12px 0;
      border-radius: 8px;
    }

    #idolDropdown {
      max-width: 420px;
      background: white;
      border: 1px solid #ddd;
      list-style: none;
      padding: 0;
      margin: -6px 0 8px;
      max-height: 220px;
      overflow-y: auto;
    }

    #idolDropdown li {
      padding: 8px;
      border-bottom: 1px solid #eee;
      cursor: pointer;
    }

    #idolDropdown li:hover {
      background: #f0f0f0;
    }

    #selectedIdol {
      font-size: 14px;
      color: #333;
      margin-bottom: 8px;
    }

    #submitBtn {
      background: #333;
      color: white;
      font-weight: bold;
      padding: 10px 16px;
      border-radius: 6px;
      border: none;
    }
  </style>
</head>

<body>

<a href="index.html">← トップに戻る</a>

<h1>イベント登録</h1>

<!-- ★ここ追加 -->
<div class="section">
  <h3>X投稿から読み込み</h3>
  <input id="xUrl" placeholder="Xの投稿URL">
  <button onclick="loadFromX()">読み込み</button>
  <textarea id="xText" rows="6" placeholder="読み込んだ内容"></textarea>
</div>

<div class="section">
  <p>イベント名</p>
  <input id="title">

  <p>日付</p>
  <input id="date" type="date">

  <p>出演アイドル</p>
  <input id="idolSearch" placeholder="入力して絞り込み">
  <ul id="idolDropdown"></ul>
  <div id="selectedIdol">未選択</div>

  <input type="hidden" id="idolId">
  <input type="hidden" id="idolName">
</div>

<div class="section">
  <h3>出演時間</h3>

  <p>出演開始</p>
  <select id="startTime"></select>

  <p>出演終了</p>
  <select id="endTime"></select>
</div>

<div class="section">
  <h3>特典会時間</h3>

  <p>特典会開始</p>
  <select id="benefitStartTime"></select>

  <p>特典会終了</p>
  <select id="benefitEndTime"></select>
</div>

<div class="section">
  <h3>入特</h3>

  <label><input type="checkbox" class="benefitCheck" value="サインなしチェキ券"> サインなしチェキ券</label>
  枚数 <input type="number" class="benefitCount" data-benefit="サインなしチェキ券" min="1" value="1"><br>

  <label><input type="checkbox" class="benefitCheck" value="サインありチェキ券"> サインありチェキ券</label>
  枚数 <input type="number" class="benefitCount" data-benefit="サインありチェキ券" min="1" value="1"><br>

  <label><input type="checkbox" class="benefitCheck" value="コメントありチェキ券"> コメントありチェキ券</label>
  枚数 <input type="number" class="benefitCount" data-benefit="コメントありチェキ券" min="1" value="1"><br>

  <label><input type="checkbox" class="benefitCheck" value="写メ券"> 写メ券</label>
  枚数 <input type="number" class="benefitCount" data-benefit="写メ券" min="1" value="1"><br>

  <label><input type="checkbox" class="benefitCheck" value="動画券"> 動画券</label>
  枚数 <input type="number" class="benefitCount" data-benefit="動画券" min="1" value="1"><br>

  <label><input type="checkbox" class="benefitCheck" value="私物サイン券"> 私物サイン券</label>
  枚数 <input type="number" class="benefitCount" data-benefit="私物サイン券" min="1" value="1"><br><br>

  <label><input type="checkbox" id="otherCheck"> その他</label>
  <input id="otherText" placeholder="入特名">
  枚数 <input type="number" id="otherCount" min="1" value="1"><br>
  <textarea id="otherDescription" placeholder="その他入特の説明"></textarea>
</div>

<button id="submitBtn">登録</button>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getFirestore, collection, getDocs, addDoc, doc, updateDoc, arrayUnion } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSy...",
    authDomain: "fumiya-calender.firebaseapp.com",
    projectId: "fumiya-calender",
    storageBucket: "fumiya-calender.firebasestorage.app",
    messagingSenderId: "946430755375",
    appId: "1:946430755375:web:b64afd78461cb94143fcda"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  let idols = [];

  async function loadIdols() {
    const snapshot = await getDocs(collection(db, "idols"));

    snapshot.forEach(docSnap => {
      idols.push(docSnap.data());
    });

    idols.sort((a, b) => Number(a.idolId) - Number(b.idolId));
    renderIdolDropdown(idols);
  }

  function renderIdolDropdown(list) {
    const dropdown = document.getElementById("idolDropdown");
    dropdown.innerHTML = "";

    list.forEach(idol => {
      const li = document.createElement("li");
      li.textContent = idol.name;

      li.addEventListener("click", function () {
        document.getElementById("idolSearch").value = idol.name;
        document.getElementById("idolId").value = idol.idolId;
        document.getElementById("idolName").value = idol.name;
        document.getElementById("selectedIdol").textContent = `選択中：${idol.name}`;
        dropdown.innerHTML = "";
      });

      dropdown.appendChild(li);
    });
  }

  loadIdols();

  // ★ここ追加（X読み込み）
  window.loadFromX = async function () {
    const url = document.getElementById("xUrl").value;

    if (!url) {
      alert("URLを入力してください");
      return;
    }

    try {
      const res = await fetch(`https://publish.twitter.com/oembed?url=${encodeURIComponent(url)}`);
      const data = await res.json();

      const html = data.html || "";

      const text = html
        .replace(/<br\s*\/?>/gi, "\n")
        .replace(/<[^>]*>/g, "")
        .replace(/&amp;/g, "&")
        .trim();

      document.getElementById("xText").value = text;

      applyToForm(text);

    } catch (e) {
      console.error(e);
      alert("取得失敗");
    }
  }

  function applyToForm(text) {
    const lines = text.split("\n").filter(l => l.trim());

    if (lines[0]) {
      document.getElementById("title").value = lines[0];
    }

    const match = text.match(/(\d{1,2})[\/月](\d{1,2})/);
    if (match) {
      const y = new Date().getFullYear();
      const m = match[1].padStart(2, "0");
      const d = match[2].padStart(2, "0");
      document.getElementById("date").value = `${y}-${m}-${d}`;
    }
  }
</script>

</body>
</html>
