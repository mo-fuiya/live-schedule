<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>アイドルライブカレンダー</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.css" rel="stylesheet">
</head>

<body>

<h1>アイドルライブカレンダー</h1>

<input type="text" id="searchInput" placeholder="検索（アイドル・イベント）">
<ul id="searchResults"></ul>

<button id="showFavorites">お気に入りだけ表示</button>
<button id="showAll">全て表示</button>

<div id="calendar"></div>

<script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.js"></script>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyBk42gV5BH_ZiM79DSKPqAKXWU44REVpngk",
    authDomain: "fumiya-calender.firebaseapp.com",
    projectId: "fumiya-calender",
    storageBucket: "fumiya-calender.firebasestorage.app",
    messagingSenderId: "946430755375",
    appId: "1:946430755375:web:b64afd78461cb94143fcda"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  let allEventsData = [];
  let allIdolsData = [];
  let calendar;

  async function loadEvents() {
    const querySnapshot = await getDocs(collection(db, "events"));
    const events = [];

    querySnapshot.forEach((doc) => {
      const data = doc.data();
      allEventsData.push(data);

      events.push({
        title: data.title,
        start: data.date
      });
    });

    return events;
  }

  async function loadIdols() {
    const querySnapshot = await getDocs(collection(db, "idols"));

    querySnapshot.forEach((doc) => {
      allIdolsData.push(doc.data());
    });
  }

  function convertEvents(events) {
    return events.map(e => ({
      title: e.title,
      start: e.date
    }));
  }

  document.addEventListener("DOMContentLoaded", async function () {
    await loadIdols();
    const events = await loadEvents();

    calendar = new FullCalendar.Calendar(
      document.getElementById("calendar"),
      {
        initialView: "dayGridMonth",
        events: events,

        eventClick: function(info) {
          const title = info.event.title;
          const date = info.event.startStr;

          window.location.href = `event.html?title=${encodeURIComponent(title)}&date=${date}`;
        }
      }
    );

    calendar.render();

    document.getElementById("showFavorites").addEventListener("click", function () {
      const favorites = JSON.parse(localStorage.getItem("favorites")) || [];

      const filtered = allEventsData.filter(e =>
        e.appearances?.some(a => favorites.includes(Number(a.idolId)))
      );

      calendar.removeAllEvents();
      calendar.addEventSource(convertEvents(filtered));
    });

    document.getElementById("showAll").addEventListener("click", function () {
      calendar.removeAllEvents();
      calendar.addEventSource(events);
    });

    const searchInput = document.getElementById("searchInput");
    const searchResults = document.getElementById("searchResults");

    searchInput.addEventListener("input", function () {
      const keyword = searchInput.value.toLowerCase().trim();
      searchResults.innerHTML = "";

      if (keyword === "") return;

      allEventsData.forEach(event => {
        if (event.title && event.title.toLowerCase().includes(keyword)) {
          const li = document.createElement("li");

          const link = document.createElement("a");
          link.textContent = "【イベント】" + event.title;
          link.href = `event.html?title=${encodeURIComponent(event.title)}&date=${event.date}`;

          li.appendChild(link);
          searchResults.appendChild(li);
        }
      });

      allIdolsData.forEach(idol => {
        const name = idol.name || "";
        const kana = idol.kana || "";
        const aliases = idol.aliases || [];

        const isMatch =
          name.toLowerCase().includes(keyword) ||
          kana.toLowerCase().includes(keyword) ||
          aliases.some(alias => String(alias).toLowerCase().includes(keyword));

        if (isMatch) {
          const li = document.createElement("li");

          const link = document.createElement("a");
          link.textContent = "【アイドル】" + name;
          link.href = `idol.html?id=${idol.idolId}`;

          li.appendChild(link);
          searchResults.appendChild(li);
        }
      });
    });
  });
</script>

</body>
</html>
