<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>アイドルページ</title>

  <!-- FullCalendar -->
  <link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.css" rel="stylesheet">
</head>

<body>

<h1 id="name"></h1>

<h2>出演イベント一覧</h2>
<ul id="eventList"></ul>

<h2>カレンダー</h2>
<div id="calendar"></div>

<script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.js"></script>

<script>
const params = new URLSearchParams(window.location.search);
const idolId = Number(params.get("id"));

fetch("data.json?nocache=" + new Date().getTime())
  .then(res => res.json())
  .then(data => {

    // アイドル名表示
    const idol = data.idols.find(i => i.id === idolId);
    document.getElementById("name").textContent = idol.name;

    const eventList = document.getElementById("eventList");
    const calendarEvents = [];

    data.events.forEach(e => {
      e.appearances.forEach(a => {
        if (a.idolId === idolId) {

          // 一覧表示
          const li = document.createElement("li");

          li.innerHTML = `
            ${e.title}<br>
            ${a.startTime} - ${a.endTime}<br>
            特典: ${a.benefits.join(", ")}
          `;

          eventList.appendChild(li);

          // カレンダー用
          calendarEvents.push({
            title: e.title,
            start: e.date
          });
        }
      });
    });

    // カレンダー生成
    const calendar = new FullCalendar.Calendar(
      document.getElementById('calendar'),
      {
        initialView: 'dayGridMonth',
        events: calendarEvents
      }
    );

    calendar.render();
  });
</script>

</body>
</html>
