<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>アイドル詳細</title>

  <link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.css" rel="stylesheet">
</head>

<body>

<a href="index.html">← トップに戻る</a>

<h1 id="name"></h1>
<button id="favoriteBtn">⭐ お気に入り</button>

<h2>出演イベント一覧</h2>
<ul id="eventList"></ul>

<h2>出演カレンダー</h2>
<div id="calendar"></div>

<script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.js"></script>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyBk42gV5BH_ZiM79DSKPqAKXWU44REVpngk",
    authDomain: "fumiya-calender.firebaseapp.com",
    projectId: "fumiya-calender",
    storageBucket: "fumiya-calender.firebasestorage.app",
    messagingSenderId: "946430755375",
    appId: "1:946430755375:web:b64afd78461cb94143fcda"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  const params = new URLSearchParams(window.location.search);
  const idolId = Number(params.get("id"));

  document.addEventListener("DOMContentLoaded", async function () {

    const querySnapshot = await getDocs(collection(db, "events"));

    const eventList = document.getElementById("eventList");
    const calendarEvents = [];

    // ⭐ お気に入り機能
    const favoriteBtn = document.getElementById("favoriteBtn");
    let favorites = JSON.parse(localStorage.getItem("favorites")) || [];

    if (favorites.includes(idolId)) {
      favoriteBtn.textContent = "★ お気に入り済み";
    }

    favoriteBtn.addEventListener("click", function () {
      if (favorites.includes(idolId)) {
        favorites = favorites.filter(id => id !== idolId);
        favoriteBtn.textContent = "⭐ お気に入り";
      } else {
        favorites.push(idolId);
        favoriteBtn.textContent = "★ お気に入り済み";
      }

      localStorage.setItem("favorites", JSON.stringify(favorites));
    });

    querySnapshot.forEach((doc) => {
      const e = doc.data();

      e.appearances?.forEach(a => {
        if (a.idolId === idolId) {

          // 一覧表示
          const li = document.createElement("li");

          const link = document.createElement("a");
          link.textContent = e.title;
          link.href = `event.html?title=${encodeURIComponent(e.title)}&date=${e.date}`;

          const info = document.createElement("div");
          info.innerHTML = `
            出演時間: ${a.startTime || "-"} - ${a.endTime || "-"}<br>
            特典: ${a.benefits?.join(", ") || "-"}
          `;

          li.appendChild(link);
          li.appendChild(info);
          eventList.appendChild(li);

          // カレンダー
          calendarEvents.push({
            title: e.title,
            start: e.date,
            url: `event.html?title=${encodeURIComponent(e.title)}&date=${e.date}`
          });
        }
      });
    });

    const calendar = new FullCalendar.Calendar(
      document.getElementById("calendar"),
      {
        initialView: "dayGridMonth",
        events: calendarEvents
      }
    );

    calendar.render();

    // 名前表示（簡易）
    document.getElementById("name").textContent = "アイドルID: " + idolId;

  });
</script>

</body>
</html>
