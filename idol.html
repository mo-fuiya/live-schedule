<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>アイドル詳細</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.css" rel="stylesheet">

  <style>
    body {
      font-family: sans-serif;
      padding: 16px;
      margin: 0;
      background: #f7f7f7;
    }

    a {
      color: #0066cc;
      text-decoration: none;
    }

    section {
      background: white;
      padding: 12px;
      margin-top: 16px;
      border-radius: 8px;
    }

    li {
      margin-bottom: 12px;
    }

    #calendar {
      background: white;
      padding: 8px;
      border-radius: 8px;
    }
  </style>
</head>

<body>

<a href="index.html">← トップに戻る</a>

<h1 id="name"></h1>
<button id="favoriteBtn">⭐ お気に入り</button>

<section>
  <h2>出演イベント一覧</h2>
  <ul id="eventList"></ul>
</section>

<section>
  <h2>入特一覧</h2>
  <ul id="benefitList"></ul>
</section>

<section>
  <h2>出演カレンダー</h2>
  <div id="calendar"></div>
</section>

<script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.js"></script>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyBk42gV5BH_ZiM79DSKPqAKXWU44REVpngk",
    authDomain: "fumiya-calender.firebaseapp.com",
    projectId: "fumiya-calender",
    storageBucket: "fumiya-calender.firebasestorage.app",
    messagingSenderId: "946430755375",
    appId: "1:946430755375:web:b64afd78461cb94143fcda"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  const params = new URLSearchParams(window.location.search);
  const idolId = Number(params.get("id"));

  document.addEventListener("DOMContentLoaded", async function () {
    const querySnapshot = await getDocs(collection(db, "events"));

    const eventList = document.getElementById("eventList");
    const benefitList = document.getElementById("benefitList");
    const calendarEvents = [];
    const benefitSet = new Set();

    let idolName = "";

    const favoriteBtn = document.getElementById("favoriteBtn");
    let favorites = JSON.parse(localStorage.getItem("favorites")) || [];

    if (favorites.includes(idolId)) {
      favoriteBtn.textContent = "★ お気に入り済み";
    }

    favoriteBtn.addEventListener("click", function () {
      if (favorites.includes(idolId)) {
        favorites = favorites.filter(id => id !== idolId);
        favoriteBtn.textContent = "⭐ お気に入り";
      } else {
        favorites.push(idolId);
        favoriteBtn.textContent = "★ お気に入り済み";
      }

      localStorage.setItem("favorites", JSON.stringify(favorites));
    });

    querySnapshot.forEach((doc) => {
      const event = doc.data();

      event.appearances?.forEach(a => {
        if (a.idolId === idolId) {
          idolName = a.idolName;

          const li = document.createElement("li");

          const link = document.createElement("a");
          link.textContent = event.title;
          link.href = `event.html?title=${encodeURIComponent(event.title)}&date=${event.date}`;

          const info = document.createElement("div");
          info.innerHTML = `
            出演時間: ${a.startTime || "-"} - ${a.endTime || "-"}<br>
            特典会: ${a.benefitTime || "-"}<br>
            入特: ${renderBenefitText(a.benefits)}
          `;

          li.appendChild(link);
          li.appendChild(info);
          eventList.appendChild(li);

          calendarEvents.push({
            title: event.title,
            start: event.date,
            url: `event.html?title=${encodeURIComponent(event.title)}&date=${event.date}`
          });

          a.benefits?.forEach(b => {
            let name = "";
            let description = "";

            if (typeof b === "string") {
              name = b;
              description = "説明なし";
            } else {
              name = b.name;
              description = b.description || "説明なし";
            }

            const key = `${name}-${description}`;

            if (!benefitSet.has(key)) {
              benefitSet.add(key);

              const benefitLi = document.createElement("li");
              benefitLi.innerHTML = `
                <strong>${name}</strong><br>
                ${description}
              `;

              benefitList.appendChild(benefitLi);
            }
          });
        }
      });
    });

    document.getElementById("name").textContent = idolName || "アイドル詳細";

    const calendar = new FullCalendar.Calendar(
      document.getElementById("calendar"),
      {
        initialView: "dayGridMonth",
        events: calendarEvents
      }
    );

    calendar.render();
  });

  function renderBenefitText(benefits) {
    if (!benefits || benefits.length === 0) return "-";

    return benefits.map(b => {
      if (typeof b === "string") return b;
      return `${b.name}${b.count}枚`;
    }).join(", ");
  }
</script>

</body>
</html>
