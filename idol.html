<!DOCTYPE html>
<html>
<body>

<h1 id="name"></h1>

<h2>出演イベント</h2>
<ul id="eventList"></ul>

<script>
  const params = new URLSearchParams(window.location.search);
  const idolId = Number(params.get("id"));

  fetch("data.json")
    .then(res => res.json())
    .then(data => {
      const idol = data.idols.find(i => i.id === idolId);
      document.getElementById("name").textContent = idol.name;

      const eventList = document.getElementById("eventList");

     data.events.forEach(e => {
  e.appearances.forEach(a => {
    if (a.idolId === idolId) {
      const li = document.createElement("li");

      li.innerHTML = `
        ${e.title}<br>
        ${a.startTime} - ${a.endTime}<br>
        特典: ${a.benefits.join(", ")}
      `;

      eventList.appendChild(li);
    }
  });
});
</script>

</body>
</html>
