<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>アイドル詳細</title>

  <link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.css" rel="stylesheet">
</head>
<body>
<a href="index.html">← トップに戻る</a>
<h1 id="name"></h1>
<button id="favoriteBtn">⭐ お気に入り</button>

<h2>出演イベント一覧</h2>
<ul id="eventList"></ul>

<h2>出演カレンダー</h2>
<div id="calendar"></div>

<script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.js"></script>

<script>
const params = new URLSearchParams(window.location.search);
const idolId = Number(params.get("id"));

fetch("data.json?nocache=" + new Date().getTime())
  .then(res => res.json())
  .then(data => {
    const idol = data.idols.find(i => i.id === idolId);
    document.getElementById("name").textContent = idol.name;

    // ⭐ お気に入り機能ここから
    const favoriteBtn = document.getElementById("favoriteBtn");
    let favorites = JSON.parse(localStorage.getItem("favorites")) || [];

    if (favorites.includes(idolId)) {
      favoriteBtn.textContent = "★ お気に入り済み";
    }

    favoriteBtn.addEventListener("click", function () {
      if (favorites.includes(idolId)) {
        favorites = favorites.filter(id => id !== idolId);
        favoriteBtn.textContent = "⭐ お気に入り";
      } else {
        favorites.push(idolId);
        favoriteBtn.textContent = "★ お気に入り済み";
      }

      localStorage.setItem("favorites", JSON.stringify(favorites));
    });
    // ⭐ ここまで

    const eventList = document.getElementById("eventList");
    const calendarEvents = [];

    data.events.forEach(e => {
      e.appearances.forEach(a => {
        if (a.idolId === idolId) {
          const li = document.createElement("li");

          const link = document.createElement("a");
          link.textContent = e.title;
          link.href = `event.html?title=${encodeURIComponent(e.title)}&date=${e.date}`;

          const info = document.createElement("div");
          info.innerHTML = `
            出演時間: ${a.startTime} - ${a.endTime}<br>
            特典: ${a.benefits.join(", ")}
          `;

          li.appendChild(link);
          li.appendChild(info);
          eventList.appendChild(li);

          calendarEvents.push({
            title: e.title,
            start: e.date,
            url: `event.html?title=${encodeURIComponent(e.title)}&date=${e.date}`
          });
        }
      });
    });

    const calendar = new FullCalendar.Calendar(
      document.getElementById("calendar"),
      {
        initialView: "dayGridMonth",
        events: calendarEvents
      }
    );

    calendar.render();
  });
</script>

</body>
</html>
