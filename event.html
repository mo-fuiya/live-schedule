<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>イベント詳細</title>
</head>

<body>

<a href="index.html">← トップに戻る</a>

<h1 id="title"></h1>
<p id="date"></p>

<h2>出演アイドル</h2>
<ul id="appearanceList"></ul>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyBk42gV5BH_ZiM79DSKPqAKXWU44REVpngk",
    authDomain: "fumiya-calender.firebaseapp.com",
    projectId: "fumiya-calender",
    storageBucket: "fumiya-calender.firebasestorage.app",
    messagingSenderId: "946430755375",
    appId: "1:946430755375:web:b64afd78461cb94143fcda"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  const params = new URLSearchParams(window.location.search);
  const title = params.get("title");
  const date = params.get("date");

  document.getElementById("title").textContent = title;
  document.getElementById("date").textContent = date;

  document.addEventListener("DOMContentLoaded", async function () {

    const querySnapshot = await getDocs(collection(db, "events"));

    const list = document.getElementById("appearanceList");

    querySnapshot.forEach((doc) => {
      const e = doc.data();

      if (e.title === title) {

        e.appearances?.forEach(a => {

          const li = document.createElement("li");

          const link = document.createElement("a");
          link.textContent = a.idolName || ("ID:" + a.idolId);

          // 👇 idolNameしかない場合は飛べないので注意
          if (a.idolId) {
            link.href = `idol.html?id=${a.idolId}`;
          }

          const info = document.createElement("div");
          info.innerHTML = `
            ${a.startTime || "-"} - ${a.endTime || "-"}<br>
            特典: ${a.benefits?.join(", ") || "-"}
          `;

          li.appendChild(link);
          li.appendChild(info);
          list.appendChild(li);

        });

      }
    });

  });
</script>

</body>
</html>
