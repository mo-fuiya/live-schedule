<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>イベント詳細</title>
</head>
<body>
<a href="index.html">← トップに戻る</a>
<h1 id="title"></h1>
<p id="date"></p>

<h2>出演アイドル</h2>
<ul id="appearanceList"></ul>

<script>
const params = new URLSearchParams(window.location.search);
const title = params.get("title");
const date = params.get("date");

document.getElementById("title").textContent = title;
document.getElementById("date").textContent = date;

fetch("data.json?nocache=" + new Date().getTime())
  .then(res => res.json())
  .then(data => {
    const event = data.events.find(e => e.title === title);
    const list = document.getElementById("appearanceList");

    event.appearances.forEach(a => {
      const idol = data.idols.find(i => i.id === a.idolId);

      const li = document.createElement("li");

      const link = document.createElement("a");
      link.textContent = idol.name;
      link.href = `idol.html?id=${idol.id}`;

      const info = document.createElement("div");
      info.innerHTML = `
        出演時間: ${a.startTime} - ${a.endTime}<br>
        特典: ${a.benefits.join(", ")}
      `;

      li.appendChild(link);
      li.appendChild(info);
      list.appendChild(li);
    });
  });
</script>

</body>
</html>
