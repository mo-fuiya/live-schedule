<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>イベント詳細</title>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: sans-serif;
      padding: 16px;
      margin: 0;
      background: #f7f7f7;
    }

    a {
      color: #0066cc;
      text-decoration: none;
    }

    h1 {
      font-size: 22px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      background: white;
      margin-top: 16px;
    }

    th, td {
      border: 1px solid #ddd;
      padding: 10px;
      font-size: 14px;
    }

    th {
      background: #f0f0f0;
    }

    tr:nth-child(even) {
      background: #fafafa;
    }

    /* スマホ対応 */
    @media (max-width: 600px) {
      table, thead, tbody, tr, th, td {
        display: block;
      }

      thead {
        display: none;
      }

      tr {
        margin-bottom: 12px;
        background: white;
        border: 1px solid #ddd;
        border-radius: 8px;
        padding: 8px;
      }

      td {
        border: none;
        padding: 6px 8px;
      }

      td::before {
        font-weight: bold;
        display: inline-block;
        width: 90px;
      }

      td:nth-child(1)::before { content: "グループ"; }
      td:nth-child(2)::before { content: "出演時間"; }
      td:nth-child(3)::before { content: "特典会"; }
      td:nth-child(4)::before { content: "入特"; }
    }
  </style>
</head>

<body>

<a href="index.html">← トップに戻る</a>

<h1 id="title"></h1>
<p id="date"></p>

<h2>タイムテーブル</h2>

<table>
  <thead>
    <tr>
      <th>グループ</th>
      <th>出演時間</th>
      <th>特典会時間</th>
      <th>入特</th>
    </tr>
  </thead>
  <tbody id="timetableBody"></tbody>
</table>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyBk42gV5BH_ZiM79DSKPqAKXWU44REVpngk",
    authDomain: "fumiya-calender.firebaseapp.com",
    projectId: "fumiya-calender",
    storageBucket: "fumiya-calender.firebasestorage.app",
    messagingSenderId: "946430755375",
    appId: "1:946430755375:web:b64afd78461cb94143fcda"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  const params = new URLSearchParams(window.location.search);
  const title = params.get("title");
  const date = params.get("date");

  document.getElementById("title").textContent = title;
  document.getElementById("date").textContent = date;

  document.addEventListener("DOMContentLoaded", async function () {

    const querySnapshot = await getDocs(collection(db, "events"));
    const tbody = document.getElementById("timetableBody");

    querySnapshot.forEach((doc) => {
      const event = doc.data();

      if (event.title === title) {

        // ⭐ 時間順ソート
        const sorted = event.appearances
          ?.slice()
          .sort((a, b) => a.startTime.localeCompare(b.startTime));

        sorted?.forEach(a => {

          const tr = document.createElement("tr");

          tr.innerHTML = `
            <td>
              <a href="idol.html?id=${a.idolId}">
                ${a.idolName || "-"}
              </a>
            </td>
            <td>${a.startTime || "-"} - ${a.endTime || "-"}</td>
            <td>${a.benefitTime || "-"}</td>
            <td>${a.benefits?.join(", ") || "-"}</td>
          `;

          tbody.appendChild(tr);
        });

      }
    });

  });
</script>

</body>
</html>
